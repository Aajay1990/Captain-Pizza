  <!-- Aggressive Cache Buster for Cross-Device Updates -->
  <script>
    (function() {
      var APP_VERSION = "v12.0.0"; // MUST increment this to force clear cache
      var savedVersion = localStorage.getItem('app_version');
      
      if (savedVersion !== APP_VERSION) {
        // Clear LocalStorage safely (optional, but good for fresh states, keeping auth if needed)
        // localStorage.clear(); // We won't clear auth, just update version.
        localStorage.setItem('app_version', APP_VERSION);
        
        // Aggressively clear modern Cache API
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) caches.delete(name);
          });
        }
        
        // Force hard reload using query string trick to bypass service workers/ISP cache
        var currentUrl = new URL(window.location.href);
        currentUrl.searchParams.set('v', APP_VERSION);
        window.location.replace(currentUrl.href);
      }
    })();
  </script>
